<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Women Month</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* CENTRAGE FLIPBOOK */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .flipbook {
      width: 90%;
      max-width: 900px;
      margin: auto;
    }

    /* IMAGES HOVER */
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px auto;
      border-radius: 10px;
      transition: transform 0.5s ease;
    }

    img:hover {
      transform: scale(1.05) rotate(-1deg);
    }

    /* RESPONSIVE MOBILE */
    @media (max-width: 768px) {
      .flipbook {
        transform: scale(0.9);
      }
    }

    @media (max-width: 480px) {
      .flipbook {
        transform: scale(0.8);
      }
    }

    /* FLEURS ANIMÉES */
    .flower {
      position: fixed;
      width: 40px;
      height: 40px;
      background-image: url('https://cdn-icons-png.flaticon.com/512/616/616408.png');
      background-size: cover;
      pointer-events: none;
      animation: floatFlower 5s linear infinite;
      z-index: 999;
    }

    @keyframes floatFlower {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }

      50% {
        transform: translateY(-80px) rotate(20deg);
        opacity: 0.8;
      }

      100% {
        transform: translateY(-160px) rotate(-10deg);
        opacity: 0;
      }
    }

    /* BOUTON MUSIQUE */
    #playMusicBtn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 15px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      z-index: 9999;
    }
  </style>
</head>

<body>
  <!-- BOUTON PLAY MUSIC -->
  <button id="playMusicBtn">🎵 Play Music</button>

  <!-- FLIPBOOK -->
  <div class="flipbook">
    <div class="hard">
      <div class="headline">My Crush! 💖</div>
      <small>
        <div class="subhead">A Special Wish Just for You</div>
      </small>
    </div>
    <div class="hard"></div>
    <div>
      <small>Happy women month, My Crush! 💖</small>
      <small>You make my heart smile! ❤️</small>
    </div>
    <div>
      <img src="https://ayushmj.com/wp-content/uploads/2025/02/1b2bc69983ee3ff8a91d73fe0411cb17-1-6.webp" alt="" />
      <small> Magic </small>
    </div>
    <div>
      <img src="https://ayushmj.com/wp-content/uploads/2025/02/1315780_Wallpaper2-1.webp" alt="" />
      <small> Heart beats </small>
    </div>
    <div>
      <img src="https://ayushmj.com/wp-content/uploads/2025/02/sunset-3958900_1280-1.webp" alt="" />
      <small> Special </small>
    </div>
    <div>
      <img src="https://ayushmj.com/wp-content/uploads/2025/02/sunset-4520311_1280-1.webp" alt="" />
      <small> Happiness </small>
    </div>
    <div>
      <img src="https://ayushmj.com/wp-content/uploads/2025/02/romantic-love-flowers-and-golden-gift-i99it3cbd8pzaxx1-1.webp"
        alt="" />
      <small> Love </small>
    </div>
    <div class="hard"></div>
    <div class="hard">Thank You <small>~ my woman</small></div>
  </div>

  <!-- MUSIQUE -->
  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5a3d9cb650.mp3?filename=romantic-piano-11069.mp3"
      type="audio/mpeg">
  </audio>

  <script src="jquery.js"></script>
  <script src="turn.js"></script>
  <script>
    // INIT FLIPBOOK
    $(".flipbook").turn();

    // PLAY MUSIC
    const music = document.getElementById("bgMusic");
    const playBtn = document.getElementById("playMusicBtn");
    playBtn.addEventListener("click", () => {
      music.play();
      playBtn.style.display = "none"; // cache le bouton après lecture
    });

    // CRÉATION FLEURS
    function createFlower() {
      const flower = document.createElement("div");
      flower.className = "flower";
      flower.style.left = Math.random() * window.innerWidth + "px";
      flower.style.width = 30 + Math.random() * 30 + "px"; // taille aléatoire
      flower.style.height = flower.style.width;
      document.body.appendChild(flower);
      setTimeout(() => {
        flower.remove();
      }, 5000);
    }

    setInterval(createFlower, 600); // une fleur toutes les 0,6s
  </script>
</body>

</html>
